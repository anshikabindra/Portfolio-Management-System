<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- App-like support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PortfolioHub">
<link rel="manifest" href="/static/manifest.json">

<title>PortfolioHub Register</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family: Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0047ab;
    padding:20px;
}

/* Main card */
.register-wrapper{
    width:850px;
    max-width:100%; /* 🔥 responsive fix */
    background:white;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

/* Left panel */
.welcome-panel{
    flex:1;
    background:linear-gradient(135deg,#0f5ac1,#0047ab);
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo{
    font-size:22px;
    font-weight:bold;
    margin-bottom:40px;
}

.welcome-panel h1{
    font-size:34px;
    margin:0 0 10px 0;
}

.welcome-panel p{
    opacity:0.9;
}

/* Right panel */
.register-panel{
    flex:1;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.register-panel h2{
    margin-bottom:25px;
    color:#333;
}

/* Inputs */
label{
    font-size:14px;
    color:#555;
}

input{
    width:100%;
    padding:12px 0;
    margin-bottom:20px;
    border:none;
    border-bottom:2px solid #ddd;
    outline:none;
    font-size:16px; /* prevents zoom on iPhone */
}

input:focus{
    border-bottom:2px solid #0047ab;
}

/* Button */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#FFD700;
    color:#0047ab;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#f5c400;
}

/* Login link */
.login-link{
    margin-top:20px;
    text-align:center;
}

.login-link a{
    color:#0047ab;
    text-decoration:none;
    font-weight:bold;
}

/* Error */
.error-message{
    margin-top:15px;
    background:#ffe5e5;
    color:#b00020;
    padding:8px;
    border-radius:6px;
    text-align:center;
    font-size:14px;
}

/* 🔥 MOBILE VERSION */
@media (max-width: 768px){

    .register-wrapper{
        flex-direction: column;
        border-radius:16px;
    }

    .welcome-panel{
        padding:25px;
        text-align:center;
    }

    .welcome-panel h1{
        font-size:26px;
    }

    .welcome-panel p{
        font-size:14px;
    }

    .register-panel{
        padding:25px;
    }

    .logo{
        margin-bottom:15px;
    }
}
</style>
</head>

<body>

<div class="register-wrapper">

    <!-- Left -->
    <div class="welcome-panel">

        <div class="logo">PortfolioHub</div>

        <h1>Create Account</h1>

        <p>Register to start tracking your investments, assets, and financial portfolio in one place.</p>

    </div>

    <!-- Right -->
    <div class="register-panel">

        <h2>Register</h2>

        <form method="POST">

            <label>Email</label>
            <input type="email" name="email" placeholder="your.email@example.com" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Create a password" required>

            <button type="submit">Register</button>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="error-message">
                {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

        </form>

        <div class="login-link">
            Already have an account?
            <a href="{{ url_for('login') }}">Login</a>
        </div>

    </div>

</div>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}
</script>

</body>
</html>
