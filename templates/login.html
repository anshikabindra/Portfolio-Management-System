<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PortfolioHub">
<link rel="manifest" href="/static/manifest.json">

<title>PortfolioHub Login</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family: Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0047ab;
    padding:20px;
}

/* --- SPINNER OVERLAY --- */
#loader-overlay {
    display: none; /* Hidden by default */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.9);
    z-index: 10000; /* Stays on top of everything */
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #f3f3f3;
    border-top: 5px solid #0047ab;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.loading-text {
    margin-top: 15px;
    font-weight: bold;
    color: #0047ab;
    font-size: 16px;
}

/* Main card */
.login-wrapper{
    width:850px;
    max-width:100%; 
    background:white;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

/* Left panel */
.welcome-panel{
    flex:1;
    background:linear-gradient(135deg,#0f5ac1,#0047ab);
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo{
    font-size:22px;
    font-weight:bold;
    margin-bottom:40px;
}

.welcome-panel h1{
    font-size:36px;
    margin:0 0 10px 0;
}

.welcome-panel p{
    opacity:0.9;
}

/* Right panel */
.login-panel{
    flex:1;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.login-panel h2{
    margin-bottom:25px;
    color:#333;
}

/* Inputs */
label{
    font-size:14px;
    color:#555;
}

input{
    width:100%;
    padding:12px 0;
    margin-bottom:20px;
    border:none;
    border-bottom:2px solid #ddd;
    outline:none;
    font-size:16px; 
}

input:focus{
    border-bottom:2px solid #0047ab;
}

/* Button */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#FFD700;
    color:#0047ab;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#f5c400;
}

/* Error */
.error-message{
    margin-top:15px;
    background:#ffe5e5;
    color:#b00020;
    padding:8px;
    border-radius:6px;
    text-align:center;
    font-size:14px;
}

/* Register */
.register{
    margin-top:20px;
    text-align:center;
}

.register a{
    color:#0047ab;
    text-decoration:none;
    font-weight:bold;
}

/* MOBILE VERSION */
@media (max-width: 768px){

    .login-wrapper{
        flex-direction: column;
        border-radius:16px;
    }

    .welcome-panel{
        padding:25px;
        text-align:center;
    }

    .welcome-panel h1{
        font-size:26px;
    }

    .welcome-panel p{
        font-size:14px;
    }

    .login-panel{
        padding:25px;
    }

    .logo{
        margin-bottom:15px;
    }
}
</style>
</head>

<body>

<div id="loader-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Logging in...</div>
</div>

<div class="login-wrapper">

    <div class="welcome-panel">
        <div class="logo">PortfolioHub</div>

        <h1>Welcome</h1>

        <p>Sign in to continue accessing your investment portfolio and track your assets.</p>
    </div>

    <div class="login-panel">

        <h2>Sign In</h2>

        <form method="POST" action="/" onsubmit="showLoader()">

            <label>Email</label>
            <input type="email" name="email" placeholder="your.email@example.com" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Continue</button>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="error-message">
                {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

        </form>

        <div class="register">
            Don't have an account?
            <a href="{{ url_for('register') }}">Register</a>
        </div>

    </div>

</div>

<script>
// Function to show the loading spinner
function showLoader() {
    document.getElementById('loader-overlay').style.display = 'flex';
}

// Service Worker registration
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js');
}
</script>

</body>
</html>
