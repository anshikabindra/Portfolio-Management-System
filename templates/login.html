<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PortfolioHub Login</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family: Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0047ab;
}

/* Main card */
.login-wrapper{
    width:850px;
    height:480px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

/* Left panel */

.welcome-panel{
    flex:1;
    background:linear-gradient(135deg,#0f5ac1,#0047ab);
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo{
    font-size:22px;
    font-weight:bold;
    margin-bottom:40px;
}

.welcome-panel h1{
    font-size:36px;
    margin:0 0 10px 0;
}

.welcome-panel p{
    opacity:0.9;
}

/* Right panel */

.login-panel{
    flex:1;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.login-panel h2{
    margin-bottom:25px;
    color:#333;
}

label{
    font-size:14px;
    color:#555;
}

input{
    width:100%;
    padding:10px 0;
    margin-bottom:20px;
    border:none;
    border-bottom:2px solid #ddd;
    outline:none;
    font-size:15px;
}

input:focus{
    border-bottom:2px solid #0047ab;
}

/* Login button */

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:#FFD700;
    color:#0047ab;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#f5c400;
}

/* Error message */

.error-message{
    margin-top:15px;
    background:#ffe5e5;
    color:#b00020;
    padding:8px;
    border-radius:6px;
    text-align:center;
    font-size:14px;
}

/* Register link */

.register{
    margin-top:20px;
    text-align:center;
}

.register a{
    color:#0047ab;
    text-decoration:none;
    font-weight:bold;
}

.register a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="login-wrapper">

    <!-- Left welcome section -->
    <div class="welcome-panel">
        <div class="logo">PortfolioHub</div>

        <h1>Welcome</h1>

        <p>Sign in to continue accessing your investment portfolio and track your assets.</p>
    </div>

    <!-- Right login section -->
    <div class="login-panel">

        <h2>Sign In</h2>

        <form method="POST" action="/">

            <label>Email</label>
            <input type="email" name="email" placeholder="your.email@example.com" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Continue</button>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="error-message">
                {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

        </form>

        <div class="register">
            Don't have an account?
            <a href="{{ url_for('register') }}">Register</a>
        </div>

    </div>

</div>

</body>
</html>
