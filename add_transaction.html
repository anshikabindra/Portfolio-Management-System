<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="PortfolioHub">
    <link rel="manifest" href="/static/manifest.json">

    <title>{{ title }}</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 20px; /* reduced for mobile */
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
        }

        form {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            width: 100%; /* responsive fix */
            margin: auto;
        }

        label {
            display: block;
            margin-bottom: 15px;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px; /* better touch size */
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px; /* prevents zoom on iPhone */
            box-sizing: border-box; /* ensures padding doesn't break width */
        }

        button {
            background-color: #2563eb;
            color: white;
            padding: 14px; /* bigger for mobile */
            width: 100%; /* full-width button */
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 600;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .back-link {
            display: block;
            margin-top: 15px;
            text-align: center;
        }

        .back-link a {
            text-decoration: none;
            color: #475569;
            font-size: 14px;
        }

        /* ✅ LOADING OVERLAY STYLES */
        #loading-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 15px;
            font-weight: 600;
            color: #1e40af;
            font-size: 16px;
        }

        /* ✅ Mobile optimization */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            h2 {
                font-size: 20px;
            }

            form {
                padding: 20px;
                border-radius: 8px;
            }

            label {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Saving Transaction...</div>
    </div>

    <h2>{{ title }}</h2>

    <form method="post" id="transaction-form">
        {% for field in fields %}
            <label>
                {{ field.label }}
                <input
                    type="{{ field.type }}"
                    name="{{ field.name }}"
                    {% if field.step %}step="{{ field.step }}"{% endif %}
                    {% if values and field.name in values %}value="{{ values[field.name] }}"{% endif %}
                    required
                >
            </label>
        {% endfor %}

        <button type="submit">Save Transaction</button>
    </form>

    <div class="back-link">
        <a href="{{ url_for(back_url) }}">← Back to {{ title }}</a>
    </div>

    <script>
    // Trigger loading screen on form submit
    const form = document.getElementById('transaction-form');
    const overlay = document.getElementById('loading-overlay');

    form.addEventListener('submit', function() {
        overlay.style.display = 'flex';
    });

    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js');
    }
    </script>

</body>
</html>
